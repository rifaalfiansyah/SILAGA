{% extends 'petugas/base.html' %} {% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <h3 class="fw-bold text-dark mb-0">Verifikasi Izin Tinggal</h3>
        <p class="text-muted mb-0">Tinjau data pendatang sebelum memberikan keputusan.</p>
    </div>
    <a href="{{ url_for('verifikasi_petugas') }}" class="btn btn-light border fw-semibold shadow-sm px-4">
        <i class="fa-solid fa-arrow-left"></i> Kembali
    </a>
</div>

<div class="card border-0 shadow-sm">
    <div class="card-body p-4">
        <div class="row g-4">
            <div class="col-md-6">
                <label class="form-label fw-semibold">Nama Pemohon</label>
                <input type="text" class="form-control bg-light" value="{{ data.nama_pemohon }}" readonly>
            </div>
            <div class="col-md-6">
                <label class="form-label fw-semibold">NIK Pemohon</label>
                <input type="text" class="form-control bg-light" value="{{ data.nik_pemohon_rifa }}" readonly>
            </div>
            <div class="col-md-6">
                <label class="form-label fw-semibold">Alamat Asal</label>
                <textarea class="form-control bg-light" rows="2" readonly>{{ data.alamat_asal_rifa }}</textarea>
            </div>
            <div class="col-md-6">
                <label class="form-label fw-semibold">Alamat Tujuan (Cimahi)</label>
                <textarea class="form-control bg-light" rows="2" readonly>{{ data.alamat_tujuan_rifa }}</textarea>
            </div>

            <div class="col-md-6">
                <label class="form-label fw-semibold">Kelurahan Domisili</label>
                <input type="text" class="form-control bg-light" value="{{ data.nama_kelurahan_rifa }}" readonly>
            </div>
            <div class="col-md-6">
                <label class="form-label fw-semibold">Jangka Waktu</label>
                <input type="text" class="form-control bg-light" value="{{ data.tanggal_mulai_rifa }} s/d {{ data.tanggal_berakhir_rifa }}" readonly>
            </div>

            <div class="col-md-6 text-center">
                <label class="form-label fw-bold d-block">KK Asal</label>
                <img src="{{ url_for('static', filename='uploads/' + data.file_kk_rifa) }}" class="img-fluid rounded border" style="max-height: 200px;">
            </div>
            <div class="col-md-6 text-center">
                <label class="form-label fw-bold d-block">KTP Pemohon</label>
                <img src="{{ url_for('static', filename='uploads/' + data.file_ktp_rifa) }}" class="img-fluid rounded border" style="max-height: 200px;">
            </div>
            

            <div class="col-12 mt-5 border-top pt-4 text-end">
                {% if data.status_pengajuan_rifa == 'menunggu' %}
                    <a href="{{ url_for('proses_verifikasi_izin', id_p=data.id_izin_tinggal_rifa, aksi='tolak') }}" 
                       class="btn btn-danger px-4 fw-semibold me-2" onclick="return confirm('Tolak permohonan ini?')">
                        <i class="fa-solid fa-xmark me-2"></i> Tolak
                    </a>
                    <a href="{{ url_for('proses_verifikasi_izin', id_p=data.id_izin_tinggal_rifa, aksi='setujui') }}" 
                       class="btn btn-success px-4 fw-semibold" onclick="return confirm('Setujui permohonan ini?')">
                        <i class="fa-solid fa-check me-2"></i> Setujui
                    </a>
                {% else %}
                    <span class="badge bg-{{ 'success' if data.status_pengajuan_rifa == 'disetujui' else 'danger' }} p-3 fs-6">
                        Status: {{ data.status_pengajuan_rifa | upper }}
                    </span>
                {% endif %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
