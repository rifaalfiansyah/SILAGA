{% extends 'admin/base.html' %}

{% block content %}
<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/select2-bootstrap-5-theme@1.3.0/dist/select2-bootstrap-5-theme.min.css" />

<div class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <h3 class="fw-bold text-dark mb-0">Edit Kartu Keluarga</h3>
        <p class="text-muted">Perbarui informasi data Kartu Keluarga di bawah ini.</p>
    </div>
    <div>
        <a href="{{ url_for('data_kartu_keluarga_admin') }}" class="btn btn-light border fw-semibold shadow-sm px-4">
            <i class="fa-solid fa-arrow-left"></i> Batal / Kembali
        </a>
    </div>
</div>

<div class="card border-0 shadow-sm">
    <div class="card-body p-4">
        <form action="{{ url_for('edit_kartu_keluarga_proses') }}" method="POST">
            <div class="row g-4">
                
                <div class="col-12">
                    <h5 class="border-bottom pb-2 mb-3 fw-bold">
                        <i class="bi bi-house-door me-2"></i>Informasi Utama KK
                    </h5>
                </div>

                <div class="col-md-6">
                    <label class="form-label fw-semibold">Nomor Kartu Keluarga (Readonly)</label>
                    <input type="text" name="no_kk_rifa" class="form-control bg-light" 
                           value="{{ kk.no_kk_rifa }}" readonly required>
                    <div class="form-text">Nomor KK tidak dapat diubah.</div>
                </div>

                <div class="col-md-6">
                    <label class="form-label fw-semibold">Wilayah Kelurahan</label>
                    <select name="id_kelurahan_rifa" id="select_kelurahan" class="form-select select2-rifa" required>
                        <option value="" disabled>-- Pilih Kelurahan --</option>
                        {% for kel in daftar_kelurahan %}
                        <option value="{{ kel.id_kelurahan_rifa }}" 
                                {% if kel.id_kelurahan_rifa == kk.id_kelurahan_rifa %}selected{% endif %}>
                            {{ kel.nama_kelurahan_rifa }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="col-md-12">
                    <label class="form-label fw-semibold">Alamat Lengkap</label>
                    <textarea name="alamat_rifa" class="form-control" rows="3" 
                              placeholder="Contoh: Jl. Sudirman No. 123" required>{{ kk.alamat_rifa }}</textarea>
                </div>

                <div class="col-md-6">
                    <label class="form-label fw-semibold">Rukun Tetangga (RT)</label>
                    <input type="text" name="rt_rifa" class="form-control" 
                           value="{{ kk.rt_rifa }}" placeholder="001" required maxlength="3">
                </div>

                <div class="col-md-6">
                    <label class="form-label fw-semibold">Rukun Warga (RW)</label>
                    <input type="text" name="rw_rifa" class="form-control" 
                           value="{{ kk.rw_rifa }}" placeholder="005" required maxlength="3">
                </div>

                <div class="col-12 mt-4 text-end">
                    <hr>
                    <button type="submit" class="btn btn-warning px-4 fw-semibold shadow-sm text-white">
                        <i class="fa-solid fa-save me-2"></i> Simpan Perubahan KK
                    </button>
                </div>

            </div>
        </form>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

<script>
$(document).ready(function() {
    $('.select2-rifa').select2({
        theme: 'bootstrap-5',
        width: '100%'
    });
});
</script>
{% endblock %}
