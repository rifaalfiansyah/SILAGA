{% extends 'admin/base.html' %}

{% block content %}

<div class="row g-4 mb-5">
    <div class="col-md-6">
        <div class="card border-0 shadow-sm p-3 h-100">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h6 class="text-muted fw-bold text-uppercase mb-0" style="font-size: 0.8rem;">Total Penduduk</h6>
            </div>
            <h2 class="fw-bold mb-0">{{ total_penduduk }}</h2>
            <small class="text-muted">Orang Terdaftar</small>
        </div>
    </div>
    
    <div class="col-md-6">
        <div class="card border-0 shadow-sm p-3 h-100">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h6 class="text-muted fw-bold text-uppercase mb-0" style="font-size: 0.8rem;">Kartu Keluarga</h6>
            </div>
            <h2 class="fw-bold mb-0">{{ total_kk }}</h2>
            <small class="text-muted">Kartu Keluarga Aktif</small>
        </div>
    </div>
    
    <div class="col-md-6">
        <div class="card border-0 shadow-sm p-3 h-100">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h6 class="text-muted fw-bold text-uppercase mb-0" style="font-size: 0.8rem;">Total Pengajuan</h6>
            </div>
            <h2 class="fw-bold mb-0">{{ total_pengajuan }}</h2>
            <small class="text-muted">Proses & Selesai</small>
        </div>
    </div>

    <div class="col-md-6">
        <div class="card border-0 shadow-sm p-3 h-100">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h6 class="text-muted fw-bold text-uppercase mb-0" style="font-size: 0.8rem;">Akun Sistem</h6>
            </div>
            <h2 class="fw-bold mb-0">{{ total_user }}</h2>
            <small class="text-muted">Masyarakat & Petugas</small>
        </div>
    </div>
</div>

{% endblock %}
